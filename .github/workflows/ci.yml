name: CI

on:
  push:
  pull_request:

jobs:
  verify-foundation:
    name: Validate orchestration foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required files exist
        run: |
          test -f VISION.md
          test -f PRODUCT.md
          test -f PHASE1.md
          test -f CONVENTIONS.md
          test -f ARCHITECTURE.md
          test -f TASKLIST.md
          test -f QUALITY_BAR.md
          test -f REVIEW_RUBRIC.md
          test -f orchestration/current-task.json
          test -f orchestration/tasks.json
          test -f orchestration/prompts/builder.md
          test -f orchestration/prompts/reviewer.md
          test -f orchestration/prompts/product-reviewer.md
          test -f scripts/start-task.sh
          test -f scripts/advance-task.sh
          test -f scripts/check-task-ready.sh
          test -f scripts/controller.py
          test -f scripts/run-task-chain.py

      - name: Validate JSON files
        run: |
          python3 -m json.tool orchestration/current-task.json > /dev/null
          python3 -m json.tool orchestration/tasks.json > /dev/null
          python3 -m json.tool orchestration/templates/task-result.json > /dev/null
          python3 -m json.tool orchestration/templates/review-result.json > /dev/null
          python3 -m json.tool orchestration/templates/product-result.json > /dev/null

      - name: Check bash script syntax
        run: |
          bash -n scripts/start-task.sh
          bash -n scripts/advance-task.sh
          bash -n scripts/check-task-ready.sh

      - name: Check Python syntax
        run: |
          python3 -m py_compile scripts/controller.py
          python3 -m py_compile scripts/run-task-chain.py
