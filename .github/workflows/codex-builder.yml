name: Codex Builder

on:
  issues:
    types: [labeled]

jobs:
  builder:
    if: github.event.label.name == 'role:builder'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve task context from labels
        id: task
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.issue.labels.map((l) => l.name);
            const taskLabel = labels.find((name) => /^task:\d+$/.test(name));
            const isReady = labels.includes('state:ready');

            if (!isReady) {
              core.setFailed('Issue is missing state:ready label.');
              return;
            }

            if (!taskLabel) {
              core.setFailed('Issue is missing task:<id> label.');
              return;
            }

            const taskId = taskLabel.split(':')[1];
            core.setOutput('task_id', taskId);
            core.setOutput('task_label', taskLabel);

      - name: Build Codex prompt file
        run: |
          cat > .github/codex-builder-prompt.md <<'PROMPT'
          You are the Builder agent for this repository.

          Implement exactly Task${{ steps.task.outputs.task_id }} from TASKLIST.md.

          Follow orchestration/prompts/builder.md as your role contract.
          Treat these documents as source-of-truth context:
          - VISION.md
          - PRODUCT.md
          - PHASE1.md
          - CONVENTIONS.md
          - ARCHITECTURE.md
          - TASKLIST.md
          - QUALITY_BAR.md
          - REVIEW_RUBRIC.md
          - README.md

          Constraints:
          - Do not implement future tasks.
          - Keep the change minimal and practical.
          - If requirements are ambiguous, choose the smallest honest implementation and say what is inferred.

          Output format:
          - Summary
          - Files changed
          - Checks run
          - What remains manual or unimplemented
          PROMPT

      - name: Run Codex Builder
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex-builder-prompt.md
          sandbox: workspace-write


      - name: Validate Builder output exists
        run: |
          if [ -z "${{ steps.run_codex.outputs.final-message }}" ]; then
            echo "Codex returned an empty final message; refusing to hand off to review."
            exit 1
          fi

      - name: Require workspace changes from Builder
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "Codex run did not produce repository changes; cannot create commit/PR."
            exit 1
          fi

      - name: Create or update Builder PR
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            .
          branch: codex/task-${{ steps.task.outputs.task_id }}
          commit-message: "feat(task-${{ steps.task.outputs.task_id }}): builder implementation"
          title: "Task${{ steps.task.outputs.task_id }}: Builder implementation"
          body: |
            Automated Builder output generated by `openai/codex-action@v1`.

            Task label: `${{ steps.task.outputs.task_label }}`
            Trigger issue: #${{ github.event.issue.number }}
          labels: |
            role:reviewer
            state:review
          draft: false

      - name: Require Builder PR
        run: |
          if [ -z "${{ steps.cpr.outputs.pull-request-number }}" ]; then
            echo "Builder changes were not published as a pull request."
            exit 1
          fi

      - name: Post Builder result to issue
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run_codex.outputs.final-message }}
          BUILDER_PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Builder run for Task${{ steps.task.outputs.task_id }} completed.`,
                `PR: ${process.env.BUILDER_PR_URL || '_PR not created_'}`,
                '',
                process.env.CODEX_FINAL_MESSAGE || '_No output returned from Codex._',
              ].join('\n'),
            });

      - name: Move labels to review handoff
        if: steps.cpr.outputs.pull-request-number != ""
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;

            const addLabels = ['state:review', 'role:reviewer'];
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: addLabels });

            const removeIfPresent = async (name) => {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            };

            await removeIfPresent('state:ready');
            await removeIfPresent('role:builder');
